default_environment: prod
project_id: energy_community_platform

environments:
  - name: prod

plugins:
  extractors:
    - name: tap-trentinopvgis
      pip_url: git+https://github.com/celine-eu/tap-trentinopvgis.git@main
      namespace: tap_trentinopvgis
      capabilities:
        - catalog
        - discover
        - state
      select:
        - aree_idonee.*
        - aree_non_idonee.*
        - vincoli_indiretti.*
        - vincoli_diretti.*

  loaders:
    - name: target-postgres
      variant: meltanolabs
      pip_url: meltanolabs-target-postgres
      config:
        host: ${POSTGRES_HOST}
        port: ${POSTGRES_PORT}
        user: ${POSTGRES_USER}
        password: ${POSTGRES_PASSWORD}
        database: ${POSTGRES_DB}
        default_target_schema: raw

jobs:
  - name: import
    tasks:
      - tap-trentinopvgis target-postgres
