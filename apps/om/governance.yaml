defaults:
  license: null
  ownership: []
  access_level: internal
  classification: green
  tags: []
  retention_days: 365
  documentation_url: null
  source_system: null

sources:
  # ---------------------------------------------------------------------------
  # SILVER - enriched internal datasets
  # ---------------------------------------------------------------------------

  datasets.ds_dev_silver.om_weather_hourly:
    title: "Open-Meteo Hourly Weather (Silver)"
    description: >
      Hourly weather data for energy forecasting. Contains the 4 natural
      weather variables (shortwave_radiation, cloud_cover, temperature_2m,
      precipitation), identical across historical and forecast sources.
    license: CC-BY-4.0
    access_level: internal
    ownership:
      - name: spxl
        type: organization
      - name: celine
        type: consortium
    source_system: Open-Meteo
    documentation_url: https://open-meteo.com/en/docs
    tags: [open-meteo, weather, forecast, silver]

  # ---------------------------------------------------------------------------
  # GOLD - ML feature layer
  # ---------------------------------------------------------------------------

  datasets.ds_dev_gold.om_weather_features:
    title: "Open-Meteo Weather ML Features (Gold)"
    description: >
      29 ML features for energy consumption forecasting, computed from the
      4 natural weather variables plus datetime. Includes temporal/Fourier
      encodings, temperature dynamics, rolling statistics, and interaction
      features. Identical output for historical and forecast data.
    license: CC-BY-4.0
    access_level: internal
    ownership:
      - name: spxl
        type: organization
      - name: celine
        type: consortium
    source_system: Open-Meteo
    documentation_url: https://open-meteo.com/en/docs
    tags: [open-meteo, weather, features, gold]

  # ---------------------------------------------------------------------------
  # STAGING - technical preparation layer
  # ---------------------------------------------------------------------------

  datasets.ds_dev_silver.om_wind_hourly:
    title: "Open-Meteo Hourly Wind — Trentino Grid (Silver)"
    description: >
      Hourly wind data for the Trentino region at 4.4 km resolution (~798
      grid points). Contains wind_speed_ms, wind_gusts_ms, wind_direction_deg
      from the ICON-D2 model via Open-Meteo API. Deduplicated by
      (datetime, lat, lon).
    license: CC-BY-4.0
    access_level: internal
    ownership:
      - name: spxl
        type: organization
      - name: celine
        type: consortium
    source_system: Open-Meteo
    documentation_url: https://open-meteo.com/en/docs
    tags: [open-meteo, wind, trentino, silver]

  datasets.ds_dev_gold.om_wind_gusts:
    title: "Open-Meteo Daily Wind Gust Alerts — Trentino Grid (Gold)"
    description: >
      Daily wind gust risk indicators for the Trentino region. Aggregates
      hourly wind data to daily max/avg per grid point, computes gust excess
      (max_gust - max_sustained_wind), and classifies into NORMAL / WARNING
      / ALERT tiers. Includes PostGIS geography point for spatial queries.
      Replaces dwd_icon_d2_gusts.
    license: CC-BY-4.0
    access_level: internal
    ownership:
      - name: spxl
        type: organization
      - name: celine
        type: consortium
    source_system: Open-Meteo
    documentation_url: https://open-meteo.com/en/docs
    tags: [open-meteo, wind, gusts, trentino, gold]

  # ---------------------------------------------------------------------------
  # STAGING - technical preparation layer
  # ---------------------------------------------------------------------------

  datasets.ds_dev_staging.stg_om_wind:
    title: "Staging - Open-Meteo Wind Data"
    description: >
      Technical staging view over raw Open-Meteo wind data. Casts column
      types and renames to standard units (wind_speed_ms, wind_gusts_ms,
      wind_direction_deg).
    license: CC-BY-4.0
    access_level: internal
    source_system: Open-Meteo
    tags: [open-meteo, wind, staging]

  datasets.ds_dev_raw.stg_om_weather:
    title: "Staging - Open-Meteo Hourly Weather"
    description: >
      Technical staging view over raw Open-Meteo weather data. Casts column
      types and deduplicates records by datetime prior to silver-layer
      enrichment.
    license: CC-BY-4.0
    access_level: internal
    source_system: Open-Meteo
    tags: [open-meteo, weather, staging]

  # ---------------------------------------------------------------------------
  # RAW - verbatim API data
  # ---------------------------------------------------------------------------

  datasets.raw.om_weather:
    title: "Open-Meteo Hourly Weather (Raw)"
    description: >
      Raw hourly weather data ingested from the Open-Meteo forecast and
      archive APIs. Data is stored verbatim and serves as immutable input
      for staging and downstream transformations.
    license: CC-BY-4.0
    access_level: internal
    ownership:
      - name: Open-Meteo
        type: open_source
    source_system: Open-Meteo
    documentation_url: https://open-meteo.com/en/docs
    tags: [open-meteo, weather, raw]

  datasets.raw.om_weather_wind:
    title: "Open-Meteo Wind Data — Trentino Grid (Raw)"
    description: >
      Raw hourly wind data fetched from Open-Meteo API via POST for the
      Trentino region (4.4 km grid, ~798 points, ICON-D2 model). Contains
      wind_speed_10m, wind_gusts_10m, wind_direction_10m in m/s. Updated
      6x/day (every 4 hours), 48h forecast horizon per run.
    license: CC-BY-4.0
    access_level: internal
    ownership:
      - name: Open-Meteo
        type: open_source
    source_system: Open-Meteo
    documentation_url: https://open-meteo.com/en/docs
    tags: [open-meteo, wind, trentino, raw]

  # ---------------------------------------------------------------------------
  # HEAT — temperature-based heat risk pipeline
  # ---------------------------------------------------------------------------

  datasets.raw.om_weather_heat:
    title: "Open-Meteo Heat Data — Trentino Grid (Raw)"
    description: >
      Raw daily max temperature fetched from Open-Meteo API via POST for the
      Trentino region (4.4 km grid, ~1064 points, ICON-D2 model). Contains
      temperature_2m_max and elevation. Updated 2x/day, 4-day forecast +
      3-day lookback per run.
    license: CC-BY-4.0
    access_level: internal
    ownership:
      - name: Open-Meteo
        type: open_source
    source_system: Open-Meteo
    documentation_url: https://open-meteo.com/en/docs
    tags: [open-meteo, heat, temperature, trentino, raw]

  datasets.ds_dev_staging.stg_om_heat:
    title: "Staging - Open-Meteo Heat Data"
    description: >
      Technical staging view over raw Open-Meteo heat data. Casts column
      types and renames to standard units (temp_max_c, elevation_m).
    license: CC-BY-4.0
    access_level: internal
    source_system: Open-Meteo
    tags: [open-meteo, heat, staging]

  datasets.ds_dev_silver.om_heat_daily:
    title: "Open-Meteo Daily Temperature — Trentino Grid (Silver)"
    description: >
      Daily max temperature for the Trentino region at 4.4 km resolution
      (~1064 grid points). Deduplicated by (date, lat, lon). Includes
      elevation_m and altitude_band classification (low/mid/high).
    license: CC-BY-4.0
    access_level: internal
    ownership:
      - name: spxl
        type: organization
      - name: celine
        type: consortium
    source_system: Open-Meteo
    documentation_url: https://open-meteo.com/en/docs
    tags: [open-meteo, heat, temperature, trentino, silver]

  datasets.ds_dev_gold.om_heat_risk:
    title: "Open-Meteo Daily Heat Risk — Trentino Grid (Gold)"
    description: >
      Daily heat risk indicators for the Trentino region. Classifies heat
      stress using altitude-band P90 thresholds (Crespi 1981-2010) during
      May-Sep. Consecutive-day logic: GREEN (normal), ORANGE (1-2 days),
      RED (>=3 days heatwave). Includes PostGIS geography point.
    license: CC-BY-4.0
    access_level: internal
    ownership:
      - name: spxl
        type: organization
      - name: celine
        type: consortium
    source_system: Open-Meteo
    documentation_url: https://open-meteo.com/en/docs
    tags: [open-meteo, heat, risk, trentino, gold]
