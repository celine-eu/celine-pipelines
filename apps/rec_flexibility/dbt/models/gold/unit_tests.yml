          - {device_id: 'dev-base', baseline_type: 'settlement', slot: 43, is_weekday: false, baseline_kwh: 0.1}
          - {device_id: 'dev-base', baseline_type: 'shift_potential', slot: 36, is_weekday: false, baseline_kwh: 0.05}
          - {device_id: 'dev-base', baseline_type: 'shift_potential', slot: 37, is_weekday: false, baseline_kwh: 0.05}
          - {device_id: 'dev-base', baseline_type: 'shift_potential', slot: 38, is_weekday: false, baseline_kwh: 0.05}
          - {device_id: 'dev-base', baseline_type: 'shift_potential', slot: 39, is_weekday: false, baseline_kwh: 0.05}
          - {device_id: 'dev-base', baseline_type: 'shift_potential', slot: 40, is_weekday: false, baseline_kwh: 0.05}
          - {device_id: 'dev-base', baseline_type: 'shift_potential', slot: 41, is_weekday: false, baseline_kwh: 0.05}
          - {device_id: 'dev-base', baseline_type: 'shift_potential', slot: 42, is_weekday: false, baseline_kwh: 0.05}
          - {device_id: 'dev-base', baseline_type: 'shift_potential', slot: 43, is_weekday: false, baseline_kwh: 0.05}
      - input: source('meters_gold', 'meters_energy_forecast')
        rows:
          - {device_id: 'dev-base', timestamp: '2024-06-01 09:00:00', total_consumption_kwh: 0.0, grid_import_kwh: null, period: 'forecast', data_missing: 0}
          - {device_id: 'dev-base', timestamp: '2024-06-01 10:00:00', total_consumption_kwh: 0.0, grid_import_kwh: null, period: 'forecast', data_missing: 0}
          - {device_id: 'dev-cold', timestamp: '2024-06-01 09:00:00', total_consumption_kwh: 0.5, grid_import_kwh: null, period: 'forecast', data_missing: 0}
          - {device_id: 'dev-cold', timestamp: '2024-06-01 10:00:00', total_consumption_kwh: 0.5, grid_import_kwh: null, period: 'forecast', data_missing: 0}
    expect:
