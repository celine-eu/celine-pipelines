sources:
  # ---------------------------------------------------------------------------
  # RAW - verbatim extracts from TrentinoPvGis
  # ---------------------------------------------------------------------------

  datasets.raw.aree_idonee:
    title: "Suitable PV Areas - Trentino (Raw)"
    description: >
      Suitable areas for photovoltaic installations in Trentino as defined by
      L.P. 4/2022 Allegato B, ingested from TrentinoPvGis WFS service.
    license: CC-BY-4.0
    access_level: open
    ownership:
      - name: pat
        type: public_authority
    source_system: TrentinoPvGis
    documentation_url: https://webgis.provincia.tn.it
    tags: [pvgis, raw, trentino, pv]
    dataspace:
      expose: false
      medallion: bronze

  datasets.raw.aree_non_idonee:
    title: "Unsuitable PV Areas - Trentino (Raw)"
    description: >
      Unsuitable areas for photovoltaic installations in Trentino defined by
      PUP invariants, ingested from TrentinoPvGis WFS service.
    license: CC-BY-4.0
    access_level: open
    ownership:
      - name: pat
        type: public_authority
    source_system: TrentinoPvGis
    documentation_url: https://webgis.provincia.tn.it
    tags: [pvgis, raw, trentino, pv]
    dataspace:
      expose: false
      medallion: bronze

  datasets.raw.vincoli_indiretti:
    title: "Indirect Heritage Constraints - Trentino (Raw)"
    description: >
      Indirect constraints on architectural heritage properties in Trentino,
      ingested from TrentinoPvGis WFS service.
    license: CC-BY-4.0
    access_level: open
    ownership:
      - name: pat
        type: public_authority
    source_system: TrentinoPvGis
    documentation_url: https://webgis.provincia.tn.it
