version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: flexibility_commitments_mirror
        description: >
          90-day sliding window mirror of all flexibility commitments from the
          CELINE Flexibility API. Refreshed every 15 minutes by the
          rec_flexibility_commitments pipeline.
        freshness:
          warn_after: {count: 30, period: minute}
          error_after: {count: 2, period: hour}
        loaded_at_field: last_updated

  - name: rec_metering_gold
    schema: "{{ env_var('CELINE_GOLD_SCHEMA', 'ds_dev_gold') }}"
    description: >
      Gold meters tables produced by the rec_metering pipeline app and exposed via
      dataset-api (governance.yaml). One row per (device_id, ts): consumption_kwh =
      M1 consumption, production_kwh = M1 grid export, self_consumed_kwh =
      Σ(M2, M2_2 production) − M1 export (unclipped — negative values are real and
      must be clipped by consumers). Refreshed every 10 minutes.
    tables:
      - name: meters_data_15m
        description: >
          Sanctioned 15-min meter interface, pass-through of
          ds_dev_silver.meters_data_normalized. Includes M2-only slots (PV reading
          with no M1 row) as consumption_kwh = production_kwh = 0.
        freshness:
          warn_after: {count: 30, period: minute}
          error_after: {count: 2, period: hour}
        loaded_at_field: ts
