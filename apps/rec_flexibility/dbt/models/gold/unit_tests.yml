  - name: w11_cold_start_device_falls_back_beside_baseline
    description: >
      Mixed window: dev-base (has baselines) gets the v3 estimate (1.2 kWh -> 11 pts);
      dev-cold (no baselines) keeps the forecast estimate (0.5x2=1.0 kWh -> 9 pts).
      Total 2.2 < community_kwh 4.0 -> no normalization.
    model: rec_flexibility_windows
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('rec_flexibility_windows_community')
        rows:
          - {ts_date: '2024-06-01', window_start: '2024-06-01 09:00:00', window_end: '2024-06-01 11:00:00', community_kwh: 4.0, confidence: 0.75}
      - input: ref('rec_device_class')
        rows:
          - {device_id: 'dev-base', is_m1_only: false}
      - input: ref('rec_device_baselines')
        rows:
          - {device_id: 'dev-base', baseline_type: 'settlement', slot: 36, is_weekday: false, baseline_kwh: 0.1}
          - {device_id: 'dev-base', baseline_type: 'settlement', slot: 37, is_weekday: false, baseline_kwh: 0.1}
