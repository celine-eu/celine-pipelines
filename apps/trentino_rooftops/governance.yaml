  # ---------------------------------------------------------------------------
  # GOLD - PV building suitability assessment
  # ---------------------------------------------------------------------------

  datasets.ds_dev_gold.pv_building_suitability:
    title: "PV Building Suitability - Trentino (Gold)"
    description: >
      Overture Maps buildings in Trentino eligible for PV installation:
      located within a suitable area (L.P. 4/2022 Allegato B) and not
      intersecting unsuitable areas (PUP invariants) or direct/indirect
      heritage constraints.
    license: ODbL-1.0
    access_level: open
    ownership:
      - name: celine
        type: project
    source_system: CELINE
    tags: [pv, gold, trentino, buildings, suitability]
    dataspace:
      expose: true
      medallion: gold
      contract_required: false
      consent_required: false
      odrl_action: use
      purpose: [energy_planning, pv_estimation]
    dcat:
      publisher_uri: null
      themes:
        - http://publications.europa.eu/resource/authority/data-theme/ENER
        - http://publications.europa.eu/resource/authority/data-theme/REGI
      language_uris:
        - http://publications.europa.eu/resource/authority/language/ENG
      spatial_uris:
        - http://data.europa.eu/nuts/code/ITH2
      accrual_periodicity: http://publications.europa.eu/resource/authority/frequency/IRREG
      conforms_to: null
      temporal: null

