version: 2

sources:
  - name: metering_silver
    schema: "{{ env_var('CELINE_SILVER_SCHEMA', 'ds_dev_silver') }}"
    tables:
      - name: meters_data_normalized
        freshness:
          warn_after: {count: 30, period: minute}
          error_after: {count: 2, period: hour}
        loaded_at_field: ts
