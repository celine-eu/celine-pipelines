version: 2

models:
  - name: rec_meters_15m
    description: >
      Analysis-ready 15-min meter view over ds_dev_gold.meters_data_15m (the
      sanctioned rec_metering interface), scoped to the active fleet. All columns
      are kWh per 15-min bucket. pv_production_kwh and the clipped
      self_consumed_kwh are reconstructed from the unclipped upstream
      self_consumed_kwh (matches gamification/data_loader.py::load_meters).
      Includes M2-only slots (PV reading with no M1 row, consumption = 0).
    config:
      tags: ["rec_flexibility"]
    columns:
      - name: _id
        data_tests:
          - unique
          - not_null
      - name: device_id
        data_tests:
          - not_null
      - name: ts
        data_tests:
          - not_null
      - name: self_consumed_kwh
        data_tests:
          - not_null

  - name: silver_flexibility_commitments
    description: >
      Normalised mirror of raw.flexibility_commitments_mirror. status is stripped of any
      'StatusSchema.' enum prefix so downstream bare-token filters work as written.
    config:
      tags: ["rec_flexibility"]
    columns:
      - name: commitment_id
        data_tests:
          - unique
          - not_null
      - name: device_id
        data_tests:
          # flexibility-api persists declined suggestions as status=rejected WITHOUT
          # resolving community_id/device_id (no DT call) — NULL is their contract.
          - not_null:
              config:
                where: "status != 'rejected'"
      - name: status
        data_tests:
          - not_null
