unit_tests:

  # ─────────────────────────────────────────────────────────────────────────────
  # rec_flexibility_windows
  # ─────────────────────────────────────────────────────────────────────────────

  - name: w1_three_consecutive_surplus_hours_produce_one_window
    description: >
      Three consecutive hours of surplus → one window spanning all three hours.
      window_end = max(ts) + 1h. estimated_kwh is the sum of device forecasts.
      No normalization needed (device total < community_kwh).
    model: rec_flexibility_windows
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('rec_flexibility_windows_community')
        rows:
          - {ts_date: '2024-06-01', window_start: '2024-06-01 09:00:00', window_end: '2024-06-01 12:00:00', community_kwh: 3.0, confidence: 0.75}
      - input: ref('rec_device_baselines')
        rows: []
      - input: ref('rec_device_class')
        rows: []
      - input: source('meters_gold', 'meters_energy_forecast')
        rows:
          - {device_id: 'dev-01', timestamp: '2024-06-01 09:00:00', total_consumption_kwh: 0.5, grid_import_kwh: null, period: 'forecast', data_missing: 0}
          - {device_id: 'dev-01', timestamp: '2024-06-01 10:00:00', total_consumption_kwh: 0.5, grid_import_kwh: null, period: 'forecast', data_missing: 0}
          - {device_id: 'dev-01', timestamp: '2024-06-01 11:00:00', total_consumption_kwh: 0.5, grid_import_kwh: null, period: 'forecast', data_missing: 0}
    expect:
      rows:
        - {device_id: 'dev-01', window_start: '2024-06-01 09:00:00', window_end: '2024-06-01 12:00:00', reward_points_estimated: 14}

  - name: w6_normalised_kwh_over_budget
    description: >
      When the sum of per-device estimated_kwh exceeds community_kwh, each device's share
      is scaled proportionally: device_kwh / total_device_kwh × community_kwh.
      dev-01 (1.0 kWh) and dev-02 (3.0 kWh) → total=4.0, budget=2.0.
      dev-01 gets 0.50 (5 pts), dev-02 gets 1.50 (14 pts).
    model: rec_flexibility_windows
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('rec_flexibility_windows_community')
        rows:
          - {ts_date: '2024-06-01', window_start: '2024-06-01 09:00:00', window_end: '2024-06-01 11:00:00', community_kwh: 2.0, confidence: 0.75}
      - input: ref('rec_device_baselines')
        rows: []
      - input: ref('rec_device_class')
        rows: []
      - input: source('meters_gold', 'meters_energy_forecast')
        rows:
          - {device_id: 'dev-01', timestamp: '2024-06-01 09:00:00', total_consumption_kwh: 0.5, grid_import_kwh: null, period: 'forecast', data_missing: 0}
          - {device_id: 'dev-01', timestamp: '2024-06-01 10:00:00', total_consumption_kwh: 0.5, grid_import_kwh: null, period: 'forecast', data_missing: 0}
          - {device_id: 'dev-02', timestamp: '2024-06-01 09:00:00', total_consumption_kwh: 1.5, grid_import_kwh: null, period: 'forecast', data_missing: 0}
          - {device_id: 'dev-02', timestamp: '2024-06-01 10:00:00', total_consumption_kwh: 1.5, grid_import_kwh: null, period: 'forecast', data_missing: 0}
    expect:
      rows:
        - {device_id: 'dev-01', window_start: '2024-06-01 09:00:00', window_end: '2024-06-01 11:00:00', reward_points_estimated: 5}
        - {device_id: 'dev-02', window_start: '2024-06-01 09:00:00', window_end: '2024-06-01 11:00:00', reward_points_estimated: 14}

  - name: w7_kwh_unchanged_within_budget
    description: >
      When total device estimated_kwh ≤ community_kwh, no normalization is applied.
      dev-01 (1.0 kWh) + dev-02 (1.6 kWh) = 2.6 < community_kwh=4.0.
    model: rec_flexibility_windows
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('rec_flexibility_windows_community')
        rows:
          - {ts_date: '2024-06-01', window_start: '2024-06-01 09:00:00', window_end: '2024-06-01 11:00:00', community_kwh: 4.0, confidence: 0.75}
      - input: ref('rec_device_baselines')
        rows: []
      - input: ref('rec_device_class')
        rows: []
      - input: source('meters_gold', 'meters_energy_forecast')
        rows:
          - {device_id: 'dev-01', timestamp: '2024-06-01 09:00:00', total_consumption_kwh: 0.5, grid_import_kwh: null, period: 'forecast', data_missing: 0}
          - {device_id: 'dev-01', timestamp: '2024-06-01 10:00:00', total_consumption_kwh: 0.5, grid_import_kwh: null, period: 'forecast', data_missing: 0}
          - {device_id: 'dev-02', timestamp: '2024-06-01 09:00:00', total_consumption_kwh: 0.8, grid_import_kwh: null, period: 'forecast', data_missing: 0}
          - {device_id: 'dev-02', timestamp: '2024-06-01 10:00:00', total_consumption_kwh: 0.8, grid_import_kwh: null, period: 'forecast', data_missing: 0}
    expect:
      rows:
        - {device_id: 'dev-01', window_start: '2024-06-01 09:00:00', window_end: '2024-06-01 11:00:00', reward_points_estimated: 9}
        - {device_id: 'dev-02', window_start: '2024-06-01 09:00:00', window_end: '2024-06-01 11:00:00', reward_points_estimated: 15}

  - name: w8_zero_forecast_device_without_baselines_excluded
    description: >
      A cold-start device (no settlement/shift_potential baselines) forecasting zero
      consumption during the window must not appear (fallback path, estimated_kwh=0
      filtered). A device with positive forecast is still returned. Devices WITH
      baselines are covered by w9-w12 and are never excluded for zero forecast.
    model: rec_flexibility_windows
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('rec_flexibility_windows_community')
        rows:
          - {ts_date: '2024-06-01', window_start: '2024-06-01 09:00:00', window_end: '2024-06-01 11:00:00', community_kwh: 3.0, confidence: 0.75}
      - input: ref('rec_device_baselines')
        rows: []
      - input: ref('rec_device_class')
        rows: []
      - input: source('meters_gold', 'meters_energy_forecast')
        rows:
          - {device_id: 'dev-01', timestamp: '2024-06-01 09:00:00', total_consumption_kwh: 0.5, grid_import_kwh: null, period: 'forecast', data_missing: 0}
          - {device_id: 'dev-01', timestamp: '2024-06-01 10:00:00', total_consumption_kwh: 0.5, grid_import_kwh: null, period: 'forecast', data_missing: 0}
          - {device_id: 'dev-02', timestamp: '2024-06-01 09:00:00', total_consumption_kwh: 0.0, grid_import_kwh: null, period: 'forecast', data_missing: 0}
          - {device_id: 'dev-02', timestamp: '2024-06-01 10:00:00', total_consumption_kwh: 0.0, grid_import_kwh: null, period: 'forecast', data_missing: 0}
    expect:
      rows:
        - {device_id: 'dev-01'}
      # dev-02 must not appear

  - name: w9_baseline_path_expected_plus_spread
    description: >
      v3: a device with settlement + shift_potential baselines is promised
      expected (0.1x8=0.8) + potential (0.05x8=0.4) = 1.2 kWh -> 11 pts,
      regardless of its forecast (liveness rows carry 0 consumption).
      2024-06-01 is a Saturday -> is_weekday=false.
    model: rec_flexibility_windows
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('rec_flexibility_windows_community')
        rows:
          - {ts_date: '2024-06-01', window_start: '2024-06-01 09:00:00', window_end: '2024-06-01 11:00:00', community_kwh: 3.0, confidence: 0.62}
      - input: ref('rec_device_class')
        rows:
          - {device_id: 'dev-01', is_m1_only: false}
      - input: ref('rec_device_baselines')
        rows:
          - {device_id: 'dev-01', baseline_type: 'settlement', slot: 36, is_weekday: false, baseline_kwh: 0.1}
          - {device_id: 'dev-01', baseline_type: 'settlement', slot: 37, is_weekday: false, baseline_kwh: 0.1}
          - {device_id: 'dev-01', baseline_type: 'settlement', slot: 38, is_weekday: false, baseline_kwh: 0.1}
          - {device_id: 'dev-01', baseline_type: 'settlement', slot: 39, is_weekday: false, baseline_kwh: 0.1}
          - {device_id: 'dev-01', baseline_type: 'settlement', slot: 40, is_weekday: false, baseline_kwh: 0.1}
          - {device_id: 'dev-01', baseline_type: 'settlement', slot: 41, is_weekday: false, baseline_kwh: 0.1}
          - {device_id: 'dev-01', baseline_type: 'settlement', slot: 42, is_weekday: false, baseline_kwh: 0.1}
          - {device_id: 'dev-01', baseline_type: 'settlement', slot: 43, is_weekday: false, baseline_kwh: 0.1}
          - {device_id: 'dev-01', baseline_type: 'shift_potential', slot: 36, is_weekday: false, baseline_kwh: 0.05}
          - {device_id: 'dev-01', baseline_type: 'shift_potential', slot: 37, is_weekday: false, baseline_kwh: 0.05}
          - {device_id: 'dev-01', baseline_type: 'shift_potential', slot: 38, is_weekday: false, baseline_kwh: 0.05}
          - {device_id: 'dev-01', baseline_type: 'shift_potential', slot: 39, is_weekday: false, baseline_kwh: 0.05}
          - {device_id: 'dev-01', baseline_type: 'shift_potential', slot: 40, is_weekday: false, baseline_kwh: 0.05}
          - {device_id: 'dev-01', baseline_type: 'shift_potential', slot: 41, is_weekday: false, baseline_kwh: 0.05}
          - {device_id: 'dev-01', baseline_type: 'shift_potential', slot: 42, is_weekday: false, baseline_kwh: 0.05}
          - {device_id: 'dev-01', baseline_type: 'shift_potential', slot: 43, is_weekday: false, baseline_kwh: 0.05}
      - input: source('meters_gold', 'meters_energy_forecast')
        rows:
          - {device_id: 'dev-01', timestamp: '2024-06-01 09:00:00', total_consumption_kwh: 0.0, grid_import_kwh: null, period: 'forecast', data_missing: 0}
          - {device_id: 'dev-01', timestamp: '2024-06-01 10:00:00', total_consumption_kwh: 0.0, grid_import_kwh: null, period: 'forecast', data_missing: 0}
    expect:
      rows:
        - {device_id: 'dev-01', estimated_kwh: "1.20", reward_points_estimated: 11, confidence: 0.62}

