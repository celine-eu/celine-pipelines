sources:
  # ---------------------------------------------------------------------------
  # RAW - ROI estimates computed by celine-roi
  # ---------------------------------------------------------------------------

  datasets.raw.pv_roi_estimates:
    title: "PV ROI Estimates - Trentino (Raw)"
    description: >
      Per-building PV installation ROI estimates computed by celine-roi.
      Includes NPV, IRR, payback period, and input parameters (kWp, CAPEX,
      production, consumption). Written by the Prefect compute task.
    license: ODbL-1.0
    access_level: internal
    ownership:
      - name: celine
        type: project
    source_system: CELINE
    tags: [pv, raw, trentino, roi, estimation]
    dataspace:
      expose: false
      medallion: bronze

  # ---------------------------------------------------------------------------
  # SILVER - deduplicated ROI estimates
  # ---------------------------------------------------------------------------

  datasets.ds_dev_silver.pv_roi_estimates:
    title: "PV ROI Estimates - Trentino (Silver)"
    description: >
      Deduplicated per-building ROI estimates, latest computation per building.
    license: ODbL-1.0
    access_level: internal
    ownership:
      - name: celine
        type: project
    source_system: CELINE
    tags: [pv, silver, trentino, roi, estimation]
    dataspace:
      expose: false
      medallion: silver

  # ---------------------------------------------------------------------------
  # GOLD - rooftop opportunities for PV installation
  # ---------------------------------------------------------------------------

  datasets.ds_dev_gold.pv_rooftop_opportunities:
    title: "PV Rooftop Opportunities - Trentino (Gold)"
    description: >
      Available rooftops in Trentino with PV installation ROI estimates.
      Buildings are suitable per L.P. 4/2022 and confirmed without existing
      PV panels. Includes financial metrics (NPV, IRR, payback), estimated
      capacity, and building geometry for visualization.
    license: ODbL-1.0
    access_level: open
    ownership:
      - name: celine
        type: project
    source_system: CELINE
    tags: [pv, gold, trentino, roi, buildings, opportunities]
    dataspace:
      expose: true
      medallion: gold
      contract_required: false
      consent_required: false
      odrl_action: use
      purpose: [energy_planning, pv_estimation, roi]
    dcat:
      publisher_uri: null
      themes:
        - http://publications.europa.eu/resource/authority/data-theme/ENER
        - http://publications.europa.eu/resource/authority/data-theme/REGI
        - http://publications.europa.eu/resource/authority/data-theme/ECON
      language_uris:
        - http://publications.europa.eu/resource/authority/language/ENG
      spatial_uris:
        - http://data.europa.eu/nuts/code/ITH2
      accrual_periodicity: http://publications.europa.eu/resource/authority/frequency/IRREG
      conforms_to: null
      temporal: null
