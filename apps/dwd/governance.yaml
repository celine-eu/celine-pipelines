sources:
  # ---------------------------------------------------------------------------
  # GOLD - exposed derived indicators
  # ---------------------------------------------------------------------------

  datasets.ds_dev_gold.dwd_icon_d2_gusts:
    title: "ICON-D2 Wind Gust Indicators (Daily, Gold)"
    description: >
      Daily wind gust indicators derived from ICON-D2 numerical weather
      prediction outputs. Aggregates daily maxima of wind speed and gust
      variables per grid point, computes gust excess, and classifies conditions
      into NORMAL, WARNING, or ALERT tiers for downstream analytics and alerts.
    license: dl-de/by-2-0
    access_level: open
    ownership:
      - name: spxl
        type: organization
      - name: celine
        type: consortium
    source_system: Deutscher Wetterdienst (DWD)
    documentation_url: https://www.dwd.de/EN/ourservices/opendata/opendata.html
    tags: [dwd, icon-d2, wind, gusts, gold]
    dataspace:
      expose: true
      medallion: gold
      contract_required: false
      consent_required: false
      odrl_action: use
      purpose: [research, analytics]
    dcat:
      publisher_uri: null
      themes:
        - http://publications.europa.eu/resource/authority/data-theme/ENVI
      language_uris:
        - http://publications.europa.eu/resource/authority/language/ENG
      spatial_uris:
        - http://publications.europa.eu/resource/authority/country/DEU
      accrual_periodicity: http://publications.europa.eu/resource/authority/frequency/DAILY
      conforms_to: null
      temporal: null

  # ---------------------------------------------------------------------------
  # SILVER - enriched internal datasets
  # ---------------------------------------------------------------------------

  datasets.ds_dev_silver.dwd_icon_d2_wind:
    title: "ICON-D2 Wind Fields (Silver)"
    description: >
      Enriched wind dataset derived from ICON-D2 model outputs. Pivots 10-meter
      u and v wind components and maximum gust values per forecast interval and
      grid point, computing wind speed as the vector magnitude. Serves as the
      basis for derived gust and energy indicators.
    license: dl-de/by-2-0
    access_level: internal
    ownership:
      - name: spxl
        type: organization
      - name: celine
        type: consortium
    source_system: Deutscher Wetterdienst (DWD)
    tags: [dwd, icon-d2, wind, silver]
    dataspace:
      expose: false
      medallion: silver

  # ---------------------------------------------------------------------------
  # STAGING - technical preparation layer
  # ---------------------------------------------------------------------------

  datasets.ds_dev_raw.stg_dwd_icon_d2:
    title: "Staging - ICON-D2 Model Output"
    description: >
      Technical staging view over raw ICON-D2 GRIB imports. Deduplicates records
      by forecast run, interval, grid point, and variable, normalizes timestamps
      and numeric types, and filters out expired forecast intervals prior to
      silver-layer enrichment.
    license: dl-de/by-2-0
    access_level: internal
    source_system: Deutscher Wetterdienst (DWD)
    tags: [dwd, icon-d2, staging]
    dataspace:
      expose: false
      medallion: silver

  # ---------------------------------------------------------------------------
  # RAW - verbatim ICON-D2 model output
  # ---------------------------------------------------------------------------

  datasets.raw.dwd_icon_d2:
    title: "ICON-D2 Numerical Weather Prediction Output (Raw)"
    description: >
      Raw ICON-D2 numerical weather prediction data produced by the Deutscher
      Wetterdienst and ingested from DWD Open Data as GRIB files via Meltano.
      Data is stored verbatim and serves as immutable input for staging and
      downstream transformations.
    license: dl-de/by-2-0
    access_level: internal
    ownership:
      - name: dwd
        type: public_authority
    source_system: Deutscher Wetterdienst (DWD)
    documentation_url: https://www.dwd.de/EN/ourservices/opendata/opendata.html
    tags: [dwd, icon-d2, raw]
    dataspace:
      expose: false
      medallion: bronze

  datasets.ds_dev_gold.dwd_icon_d2_solar_energy:
    title: "ICON-D2 Solar Energy Indicators"
    description: >
      Solar energy indicators derived from ICON-D2 solar radiation outputs,
      designed for photovoltaic and energy-related applications.
    license: dl-de/by-2-0
    source_system: Deutscher Wetterdienst (DWD)
    tags: [dwd, icon-d2, solar, energy, gold]
    ownership:
      - name: spxl
        type: organization
      - name: celine
        type: consortium
    dataspace:
      expose: false
      medallion: gold

  datasets.ds_dev_gold.pv_potential_forecast_daily:
    title: "Photovoltaic Potential Forecast – Daily"
    description: >
      Daily photovoltaic potential forecasts derived from ICON-D2
      meteorological model outputs.
    license: dl-de/by-2-0
    source_system: Deutscher Wetterdienst (DWD)
    tags: [pv, solar, forecast, daily, gold]
    ownership:
      - name: spxl
        type: organization
      - name: celine
        type: consortium
    dataspace:
      expose: false
      medallion: gold

  datasets.ds_dev_gold.pv_potential_forecast_hourly:
    title: "Photovoltaic Potential Forecast – Hourly"
    description: >
      Hourly photovoltaic potential forecasts derived from ICON-D2
      meteorological model outputs.
    license: dl-de/by-2-0
    source_system: Deutscher Wetterdienst (DWD)
    tags: [pv, solar, forecast, hourly, gold]
    ownership:
      - name: spxl
        type: organization
      - name: celine
        type: consortium
    dataspace:
      expose: false
      medallion: gold

  datasets.ds_dev_silver.dwd_icon_d2_solar_forecast_hourly:
    title: "ICON-D2 Solar Forecast – Hourly"
    description: >
      Hourly solar radiation forecast data derived from ICON-D2 outputs,
      enriched for internal analytical use.
    license: dl-de/by-2-0
    source_system: Deutscher Wetterdienst (DWD)
    tags: [dwd, icon-d2, solar, forecast, silver]
    ownership:
      - name: spxl
        type: organization
      - name: celine
        type: consortium
    dataspace:
      expose: false
      medallion: silver

  datasets.ds_dev_silver.dwd_icon_d2_solar_forecast_interval:
    title: "ICON-D2 Solar Forecast – Interval"
    description: >
      Interval-based solar radiation forecast data derived from ICON-D2 outputs,
      used as an intermediate enrichment layer.
    license: dl-de/by-2-0
    source_system: Deutscher Wetterdienst (DWD)
    tags: [dwd, icon-d2, solar, forecast, silver]
    ownership:
      - name: spxl
        type: organization
      - name: celine
        type: consortium
    dataspace:
      expose: false
      medallion: silver

  singer.tap-dwd.dwd_icon_d2:
    title: "ICON-D2 Model Output (Singer Extract)"
    description: >
      Singer ingestion stream extracting ICON-D2 numerical weather
      prediction outputs from DWD open data services.
    license: dl-de/by-2-0
    source_system: Deutscher Wetterdienst (DWD)
    tags: [dwd, icon-d2, singer, raw]
    ownership:
      - name: dwd
        type: public_authority
    dataspace:
      expose: false
      medallion: bronze
