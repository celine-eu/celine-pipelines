years: [2025, 2026]

storage:
  type: s3
  # base_dir: /data/copernicus

# storage:
#   type: s3
#   bucket: my-minio-bucket
#   endpoint_url: http://localhost:9000

datasets:
  # -----------------------------------------------------------------------
  # ERA5 temperature — only variable needed for meter forecasting
  # -----------------------------------------------------------------------

  # Backfill: monthly bulk requests (run once to seed historical data)
  # NOTE: ERA5 reanalysis has ~3 month lag — 2026 data not yet available
  era5-monthly:
    name: reanalysis-era5-single-levels
    url: https://cds.climate.copernicus.eu/api
    key: ${CDSAPI_KEY}
    granularity: monthly
    years: [2025]
    fail_on_error: true
    request:
      product_type: ["reanalysis"]
      variable:
        - "2m_temperature"
        # Not needed for meter forecasting (solar from CAMS, no wind/precip in contract):
        # - "total_precipitation"
        # - "instantaneous_10m_wind_gust"
        # - "clear_sky_direct_solar_radiation_at_surface"  # CAMS solar provides better data
        # - "cloud_base_height"                            # not cloud cover %
        # - "large_scale_rain_rate"
        # - "large_scale_precipitation"
        # - "large_scale_snowfall"
        # - "snowfall"
      time: ["00:00", "06:00", "12:00", "18:00"]
      data_format: grib
      download_format: unarchived
      area: [45.96, 11.11, 45.84, 11.36]

  # Incremental: daily requests (picks up from end of monthly backfill)
  # ERA5 has ~3 month lag, so lag_days is effectively ~90 days
  era5-daily:
    name: reanalysis-era5-single-levels
    url: https://cds.climate.copernicus.eu/api
    key: ${CDSAPI_KEY}
    granularity: daily
    years: [2026]
    min_date: 2026-01-01
    lag_days: 90
    fail_on_error: true
    request:
      product_type: ["reanalysis"]
      variable:
        - "2m_temperature"
      time: ["00:00", "06:00", "12:00", "18:00"]
      data_format: grib
      download_format: unarchived
      area: [45.96, 11.11, 45.84, 11.36]

  # -----------------------------------------------------------------------
  # CAMS solar radiation — hourly GHI, clearsky, beam/diffuse
  # -----------------------------------------------------------------------

  # Backfill: monthly bulk requests (run once)
  # CAMS solar is satellite-derived, available up to ~yesterday
  cams-solar-radiation-monthly:
    name: cams-solar-radiation-timeseries
    url: https://ads.atmosphere.copernicus.eu/api
    key: ${ADSAPI_KEY}
    file_format: csv
    granularity: monthly
    date_format: range
    years: [2025, 2026]
    max_date: 2026-05-31
    fail_on_error: false
    post_processing:
      module: copernicus_downloader.post_processing.normalize_cams_solar_radiation
      params: {}
    request:
      "sky_type": "observed_cloud"
      "location": { "longitude": 11.23, "latitude": 45.9 }
      "altitude": ["1.169"]
      "time_step": "1hour"
      "time_reference": "true_solar_time"
      "data_format": "csv"

  # Incremental: daily requests (scheduled)
  cams-solar-radiation:
    name: cams-solar-radiation-timeseries
    url: https://ads.atmosphere.copernicus.eu/api
    key: ${ADSAPI_KEY}
    file_format: csv
    granularity: daily
    date_format: range
    years: [2026]
    min_date: 2026-06-01
    lag_days: 5
    fail_on_error: false
    post_processing:
      module: copernicus_downloader.post_processing.normalize_cams_solar_radiation
      params: {}
    request:
      "sky_type": "observed_cloud"
      "location": { "longitude": 11.23, "latitude": 45.9 }
      "altitude": ["1.169"]
      "time_step": "1hour"
      "time_reference": "true_solar_time"
      "data_format": "csv"

  # -----------------------------------------------------------------------
  # Not needed for meter forecasting
  # -----------------------------------------------------------------------
