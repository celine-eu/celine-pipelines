# Observations pipeline configuration for Trentino region
# Fetches 15-minute resolution weather from Open-Meteo API (minutely_15)
# Separate from forecast pipelines (config_wind.yaml, config_heat.yaml)
#
# Rate-limit strategy: the full grid (~850 pts) is split into N chunks.
# Each run processes one chunk in round-robin, keeping per-call volume
# well below the free-tier 600 calls/min limit.  Full spatial coverage
# every chunks * 15 min = 60 min.

grid:
  lat_min: 45.44
  lat_max: 46.52
  lon_min: 10.40
  lon_max: 11.90
  spacing_deg: 0.045  # ~5 km
  chunks: 4           # ~213 points per run → single API call

# Open-Meteo API configuration — minutely_15 endpoint
api:
  base_url: "https://api.open-meteo.com/v1/forecast"
  # No model specified = best_match (picks freshest available model per timestamp)
  # model: "icon_d2"  # disabled: publication delay causes 3-6h staleness
  variables:
    - temperature_2m
    - apparent_temperature
    - wind_speed_10m
    - wind_gusts_10m
    - wind_direction_10m
    - precipitation
  wind_speed_unit: "ms"
  past_minutely_15: 8         # 2 hours back (8 x 15min)
  forecast_minutely_15: 12    # 3 hours ahead (12 x 15min)
  timezone: "Europe/Rome"
  max_points_per_call: 300    # safety cap if a chunk ever exceeds single-batch
  batch_delay_seconds: 30

# Database targets
raw:
  table: om_observations
  schema: raw

# Schedule: every 15 minutes, offset by 5 min to avoid collision
# with wind (:00) and heat (:30) pipelines.
# Each run covers 1/4 of the grid; full coverage every hour.
schedule:
  cron: "5,20,35,50 * * * *"
  name: "om-obs-trentino"
