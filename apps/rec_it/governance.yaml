defaults:
  license: null
  ownership:
    - name: rec
      type: DATA_OWNER
  access_level: internal
  access_requirements: partner
  classification: green
  tags: []
  retention_days: 365
  documentation_url: null
  source_system: rec-it
  dcat:
    themes:
      - http://publications.europa.eu/resource/authority/data-theme/ENER
    language_uris:
      - http://publications.europa.eu/resource/authority/language/ENG
    spatial_uris:
      - http://publications.europa.eu/resource/authority/country/ITA
    accrual_periodicity: http://publications.europa.eu/resource/authority/frequency/IRREG
  dataspace:
    odrl_action: use
    purpose:
      - energy-monitoring

sources:
  # ---------------------------------------------------------------------------
  # OUTPUTS: GSE public open data (Italian national regulatory authority)
  # License: CC-BY 4.0 / Italian Open Data License — publicly available
  # ---------------------------------------------------------------------------

  datasets.ds_dev_gold.gse_cabine_primarie:
    ownership:
      - name: gse
        type: DATA_OWNER
    access_level: open
    access_requirements: none
    classification: green
    tags: [geo, primary-substation, gse, open-data, gold]
    dataspace:
      expose: true

  # ---------------------------------------------------------------------------
  # OUTPUTS: Italian CER virtual consumption (GSE rules)
  # ---------------------------------------------------------------------------

  datasets.ds_dev_gold.rec_virtual_consumption_15m:
    tags: [rec, consumption, gold]
    dataspace:
      expose: true

  datasets.ds_dev_gold.rec_virtual_consumption_hourly:
    tags: [rec, consumption, gold]
    dataspace:
      expose: true

  datasets.ds_dev_gold.rec_virtual_consumption_per_device_15m:
    tags: [rec, consumption, gold]
    row_filters:
      - handler: rec_registry
        args:
          column: device_id
    dataspace:
      expose: true

  datasets.ds_dev_gold.rec_virtual_consumption_per_device_hourly:
    tags: [rec, consumption, gold]
    row_filters:
      - handler: rec_registry
        args:
          column: device_id
    dataspace:
      expose: true
