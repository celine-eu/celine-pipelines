sources:
  # ---------------------------------------------------------------------------
  # GOLD - unified weather interface
  # ---------------------------------------------------------------------------

  datasets.ds_dev_gold.weather_forecast_hourly:
    title: "Weather Forecast Hourly — All Locations (Gold)"
    description: >
      Unified sub-daily weather forecasts for all configured locations. Each
      row is attributed to a specific provider via the provider column.
      Currently sourced from MeteoTrentino for Trentino locations.
    license: CC-BY-4.0
    access_level: open
    ownership:
      - name: spxl
        type: organization
      - name: celine
        type: consortium
    tags: [weather, forecast, hourly, unified, gold]
    dataspace:
      expose: true
      medallion: gold
      contract_required: false
      consent_required: false
      odrl_action: use
      purpose: [research, analytics]
    dcat:
      publisher_uri: null
      themes:
        - http://publications.europa.eu/resource/authority/data-theme/ENVI
      language_uris:
        - http://publications.europa.eu/resource/authority/language/ENG
      spatial_uris:
        - http://data.europa.eu/nuts/code/ITH2
      accrual_periodicity: http://publications.europa.eu/resource/authority/frequency/CONT
      conforms_to: null
      temporal: null

